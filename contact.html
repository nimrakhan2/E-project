<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Nextag</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f8fafc;
            color: #334155;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 900px;
            overflow: hidden;
        }

        /* Split layout for larger screens */
        @media (min-width: 768px) {
            .container {
                flex-direction: row;
            }
        }

        /* Left Side: Contact Info Sidebar */
        .contact-info {
            background-color: #1e293b;
            color: #f8fafc;
            padding: 40px;
            flex: 1;
        }

        .contact-info h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 24px;
            color: #ffffff;
        }

        .info-group {
            margin-bottom: 20px;
        }

        .info-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 16px;
            line-height: 1.5;
        }

        .info-value a {
            color: #38bdf8;
            text-decoration: none;
            transition: color 0.2s;
        }

        .info-value a:hover {
            color: #7dd3fc;
            text-decoration: underline;
        }

        /* Right Side: Contact Form */
        .contact-form-container {
            padding: 40px;
            flex: 1.3;
        }

        .contact-form-container h3 {
            font-size: 22px;
            color: #0f172a;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        form label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #475569;
        }

        form input, 
        form textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 15px;
            color: #334155;
            background-color: #ffffff;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        form input::placeholder,
        form textarea::placeholder {
            color: #94a3b8;
        }

        form input:focus, 
        form textarea:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        form textarea {
            resize: vertical;
            min-height: 120px;
        }

        form button {
            background-color: #2563eb;
            color: #ffffff;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
        }

        form button:hover {
            background-color: #1d4ed8;
        }

        @media (min-width: 768px) {
            form button {
                width: auto;
                float: right;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="contact-info">
            <h1>Contact Us</h1>
            
            <div class="info-group">
                <div class="info-label">Company</div>
                <div class="info-value">Nextag</div>
            </div>
            
            <div class="info-group">
                <div class="info-label">Address</div>
                <div class="info-value"> Main Aptech Shahrah-e-Faisal,<br>Karachi, Pakistan</div>
            </div>
            
            <div class="info-group">
                <div class="info-label">Phone</div>
                <div class="info-value">+92 334 5678901</div>
            </div>
            
            <div class="info-group">
                <div class="info-label">Email Address</div>
                <div class="info-value"><a href="mailto:Nextag@gmail.com">Nextag@gmail.com</a></div>
            </div>
        </div>

        <div class="contact-form-container">
            <h3>Send us a message</h3>
            <form action="#" method="post">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your name" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email address" required>
                </div>
                
                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" name="subject" placeholder="How can we help you?" required>
                </div>
                
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="Type your message here..." required></textarea>
                </div>
                
                <button type="submit">Submit</button>
            </form>
        </div>
    </div>

</body>
</html>
